# nginx proxy address - http://172.17.0.1:8095

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  flatnotes:
    image: flatnotes/flatnotes:latest
    container_name: flatnotes-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - flatnotes
    ports:
      - "8095:8095"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./volumes/config/flatnotes:/config
      - ./volumes/data/flatnotes:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  flatnotes:
    external: false
